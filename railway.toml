[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python setup_secrets.py && streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.baseUrlPath \"\""
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
